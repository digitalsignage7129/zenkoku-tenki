<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お天気サイネージ</title>
    <style>
        body { margin: 0; background: #0077be; color: #ffffff; font-family: sans-serif; }
        .wrapper { width: 1920px; height: 1080px; padding: 50px; box-sizing: border-box; display: flex; flex-direction: column; gap: 30px; }
        
        /* タイトルのスタイル強化 */
        .header { font-size: 80px; font-weight: bold; border-bottom: 5px solid white; padding-bottom: 10px; }
        
        .row { display: flex; gap: 30px; flex: 1; }
        .box { background: rgba(255, 255, 255, 0.2); border-radius: 30px; padding: 40px; border: 4px solid #fff; }
        
        .current { width: 30%; font-size: 50px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .forecast { width: 70%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .fc-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 25px; text-align: center; font-size: 30px; }
        
        /* 明日・明後日の文字サイズを大きく調整 */
        .daily-box { flex: 1; text-align: center; font-size: 50px; font-weight: bold; padding: 30px; }
        .daily-temp { font-size: 60px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header" id="location-name">読み込み中...</div>
        <div class="row">
            <div class="box current" id="current">取得中...</div>
            <div class="forecast" id="hourly-forecast"></div>
        </div>
        <div class="row" id="daily-forecast" style="height: 250px;"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        // パラメータがない場合は地名を自動補完するように修正
        const townName = params.get('name') || '地域';
        const lat = params.get('lat') || '34.8153';
        const lon = params.get('lon') || '135.6567';

        document.getElementById('location-name').innerText = townName + "の天気予報";

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=3`)
            .then(res => res.json())
            .then(data => {
                const getIcon = (c) => c < 2 ? "☀️" : (c < 50 ? "☁️" : "☔");
                
                document.getElementById('current').innerHTML = `<div>現在</div><div style="font-size:120px;">${getIcon(data.current.weather_code)}</div><div>${data.current.temperature_2m}℃</div>`;
                
                let hHtml = "";
                for(let i=0; i<8; i++) {
                    hHtml += `<div class="fc-card">${i*3}h後<br><span style="font-size:50px;">${getIcon(data.hourly.weather_code[i*3])}</span><br>${data.hourly.temperature_2m[i*3]}℃</div>`;
                }
                document.getElementById('hourly-forecast').innerHTML = hHtml;

                let dHtml = "";
                for(let i=1; i<=2; i++) {
                    dHtml += `<div class="box daily-box">${i===1?"明日":"明後日"}<br><span style="font-size:80px;">${getIcon(data.daily.weather_code[i])}</span><br><span class="daily-temp">${data.daily.temperature_2m_max[i]}℃ / ${data.daily.temperature_2m_min[i]}℃</span></div>`;
                }
                document.getElementById('daily-forecast').innerHTML = dHtml;
            });
    </script>
</body>
</html>
