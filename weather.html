<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お天気サイネージシステム (OWMエラー完全回避版)</title>
    <style>
        html, body {
            margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important;
            background-color: #e6f2ff; overflow: hidden !important; position: relative;
        }
        .outer-wrapper {
            width: 1920px; height: 1080px; position: absolute; top: 50%; left: 50%;
            transform-origin: center center; transform: translate(-50%, -50%) scale(1); will-change: transform; box-sizing: border-box;
        }
        .signage-container {
            display: flex; width: 1920px; height: 1080px; box-sizing: border-box;
            background: linear-gradient(180deg, #e6f2ff 0%, #cce6ff 100%); color: #1c2d42; padding: 50px 60px; gap: 50px;
            font-family: 'Helvetica Neue', Arial, 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        }
        .main-panel { width: 800px; height: 980px; display: flex; flex-direction: column; justify-content: space-between; }
        .meta-header { display: flex; flex-direction: column; gap: 15px; border-bottom: 4px solid #1c2d42; padding-bottom: 25px; }
        .location-badge { font-size: 64px; font-weight: 900; color: #003366; display: flex; align-items: center; gap: 15px; }
        .location-badge::before { content: ''; display: inline-block; width: 26px; height: 26px; background-color: #0066cc; border-radius: 50%; }
        .live-clock-badge { font-size: 46px; font-weight: 900; color: #000000; background: #fff176; padding: 10px 35px; border-radius: 12px; border: 3px solid #1c2d42; width: fit-content; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
        .weather-hero-box { display: flex; align-items: center; margin: 20px 0; gap: 35px; }
        .weather-icon-large { font-size: 240px; line-height: 1; filter: drop-shadow(4px 4px 12px rgba(0,0,0,0.1)); }
        .weather-text-box { display: flex; flex-direction: column; }
        .weather-label { font-size: 34px; font-weight: 900; color: #4a607a; letter-spacing: 2px; }
        .weather-value { font-size: 115px; font-weight: 900; line-height: 1.1; color: #002244; }
        
        .temp-container { display: flex; gap: 25px; margin-bottom: 20px; }
        .temp-box { flex: 1; padding: 25px; border-radius: 20px; border: 3px solid #b3d1ff; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,51,102,0.05); }
        .temp-box.max { background: #fff5f5; border-color: #ffcccc; }
        .temp-box.min { background: #f0f7ff; border-color: #cce2ff; }
        .temp-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .temp-box.max .temp-title { color: #cc3333; }
        .temp-box.min .temp-title { color: #3366cc; }
        .temp-num { font-size: 72px; font-weight: 900; font-variant-numeric: tabular-nums; color: #1c2d42; }
        .temp-unit { font-size: 36px; font-weight: 900; margin-left: 2px; }

        .info-status-bar { padding: 45px 40px; border-radius: 24px; background: #ffffff; font-size: 46px; font-weight: 900; border: 3px solid #b3d1ff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 35px rgba(0,51,102,0.08); }
        .pop-label { font-size: 48px; font-weight: 900; color: #003366; }
        .pop-huge { color: #1976d2; font-size: 84px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .side-panel { flex: 1; height: 980px; display: flex; flex-direction: column; justify-content: space-between; gap: 30px; }
        .section-block { background: #ffffff; border: 3px solid #b3d1ff; border-radius: 24px; padding: 35px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 15px 35px rgba(0,51,102,0.08); }
        .section-title { font-size: 38px; font-weight: 900; color: #003366; margin-bottom: 20px; border-left: 10px solid #0066cc; padding-left: 15px; }
        .forecast-grid { display: flex; gap: 20px; }
        .forecast-card { flex: 1; background: #f4f9ff; border: 2px solid #d0e4ff; border-radius: 20px; padding: 30px 20px; text-align: center; }
        .fc-time { font-size: 28px; color: #4a607a; font-weight: 900; margin-bottom: 10px; }
        .fc-icon { font-size: 80px; margin-bottom: 10px; }
        .fc-pop { font-size: 32px; color: #1976d2; font-weight: 900; }
        .days-list { display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; }
        .day-row { display: flex; align-items: center; justify-content: space-between; background: #f4f9ff; border: 2px solid #d0e4ff; border-radius: 20px; padding: 35px 40px; }
        .day-name { font-size: 40px; font-weight: 900; width: 180px; color: #003366; }
        .day-icon { font-size: 84px; width: 100px; text-align: center; }
        .day-weather-text { font-size: 38px; font-weight: 900; width: 220px; color: #1c2d42; }
        .day-pop { font-size: 44px; font-weight: 900; color: #1976d2; width: 200px; text-align: right; }
    </style>
</head>
<body>

<div id="scaler" class="outer-wrapper">
    <div class="signage-container">
        <div class="main-panel">
            <div class="meta-header">
                <div id="cityNameDisplay" class="location-badge">設定中...</div>
                <div id="liveClock" class="live-clock-badge">--/-- --:--:--</div>
            </div>
            <div class="weather-hero-box">
                <div id="heroIcon" class="weather-icon-large">⌛</div>
                <div class="weather-text-box">
                    <div class="weather-label">現在の天気</div>
                    <div id="heroWeatherText" class="weather-value">読込中...</div>
                </div>
            </div>

            <div class="temp-container">
                <div class="temp-box max">
                    <div class="temp-title">本日の最高気温</div>
                    <div class="temp-num"><span id="maxTempVal">--</span><span class="temp-unit">°C</span></div>
                </div>
                <div class="temp-box min">
                    <div class="temp-title">本日の最低気温</div>
                    <div class="temp-num"><span id="minTempVal">--</span><span class="temp-unit">°C</span></div>
                </div>
            </div>

            <div class="info-status-bar">
                <span class="pop-label">現在の湿度</span>
                <span id="popVal" class="pop-huge">--%</span>
            </div>
        </div>

        <div class="side-panel">
            <div class="section-block">
                <div class="section-title">これからの動き (3時間おき)</div>
                <div id="forecastGrid" class="forecast-grid"></div>
            </div>
            <div class="section-block">
                <div class="section-title">明日・明後日の予報</div>
                <div class="days-list">
                    <div class="day-row">
                        <div class="day-name">明日</div>
                        <div id="day1Icon" class="day-icon">⏳</div>
                        <div id="day1Text" class="day-weather-text">--</div>
                        <div id="day1Pop" class="day-pop">--°C</div>
                    </div>
                    <div class="day-row">
                        <div class="day-name">明後日</div>
                        <div id="day2Icon" class="day-icon">⏳</div>
                        <div id="day2Text" class="day-weather-text">--</div>
                        <div id="day2Pop" class="day-pop">--°C</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function updateLiveClock() {
    const clockEl = document.getElementById('liveClock'); if (!clockEl) return;
    const now = new Date();
    clockEl.innerText = `${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
}
setInterval(updateLiveClock, 1000);

function resizeSignage() {
    const scaler = document.getElementById('scaler'); if (!scaler) return;
    const scale = Math.min(document.documentElement.clientWidth / 1920, document.documentElement.clientHeight / 1080) * 0.95; 
    scaler.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', resizeSignage);

function getWeatherEmoji(iconCode, description) {
    if (iconCode.startsWith('01')) return { text: description, icon: '☀️' };
    if (iconCode.startsWith('02')) return { text: description, icon: '⛅' };
    if (iconCode.startsWith('03') || iconCode.startsWith('04')) return { text: description, icon: '☁️' };
    if (iconCode.startsWith('09') || iconCode.startsWith('10')) return { text: description, icon: '☔' };
    if (iconCode.startsWith('11')) return { text: description, icon: '⚡' };
    if (iconCode.startsWith('13')) return { text: description, icon: '❄️' };
    return { text: description, icon: '☁️' };
}

window.onload = function() {
    updateLiveClock();
    const urlParams = new URLSearchParams(window.location.search);
    
    let rawTown = urlParams.get('mytown') || '東京';
    let cityName = decodeURIComponent(rawTown);
    
    // 💡👑【超重要：OWMエラー完全回避処理】
    // 入力された文字の末尾に「市」「区」「町」「村」があれば、APIが壊れるのを防ぐために自動消去
    let optimizedCity = cityName.replace(/[市区町村]$/, "");
    
    document.getElementById('cityNameDisplay').innerText = cityName;

    const API_KEY = 'b355658639ff342fa35b0df14555b7aa'; 
    
    Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(optimizedCity)}&appid=${API_KEY}&units=metric&lang=ja`).then(r => r.json()),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(optimizedCity)}&appid=${API_KEY}&units=metric&lang=ja`).then(r => r.json())
    ])
    .then(([currentData, forecastData]) => {
        if (currentData.cod !== 200) throw new Error("City not found");

        const currentInfo = getWeatherEmoji(currentData.weather[0].icon, currentData.weather[0].description);
        document.getElementById('heroWeatherText').innerText = currentInfo.text;
        document.getElementById('heroIcon').innerText = currentInfo.icon;
        
        document.getElementById('maxTempVal').innerText = Math.round(currentData.main.temp_max);
        document.getElementById('minTempVal').innerText = Math.round(currentData.main.temp_min);
        document.getElementById('popVal').innerText = `${currentData.main.humidity}%`;

        const grid = document.getElementById('forecastGrid'); grid.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const f = forecastData.list[i];
            const fInfo = getWeatherEmoji(f.weather[0].icon, f.weather[0].description);
            const timeStr = f.dt_txt.substring(11, 16);
            grid.innerHTML += `
                <div class="forecast-card">
                    <div class="fc-time">${timeStr}</div>
                    <div class="fc-icon">${fInfo.icon}</div>
                    <div class="fc-pop">${Math.round(f.main.temp)}°C</div>
                </div>`;
        }

        const day1 = forecastData.list[8]; 
        const day1Info = getWeatherEmoji(day1.weather[0].icon, day1.weather[0].description);
        document.getElementById('day1Text').innerText = day1Info.text;
        document.getElementById('day1Icon').innerText = day1Info.icon;
        document.getElementById('day1Pop').innerText = `${Math.round(day1.main.temp_max)}°C / ${Math.round(day1.main.temp_min)}°C`;

        const day2 = forecastData.list[16];
        const day2Info = getWeatherEmoji(day2.weather[0].icon, day2.weather[0].description);
        document.getElementById('day2Text').innerText = day2Info.text;
        document.getElementById('day2Icon').innerText = day2Info.icon;
        document.getElementById('day2Pop').innerText = `${Math.round(day2.main.temp_max)}°C / ${Math.round(day2.main.temp_min)}°C`;

        resizeSignage();
    })
    .catch(err => {
        console.error(err);
        document.getElementById('cityNameDisplay').innerText = "都市名エラー（地名のみで入力してください）";
    });

    resizeSignage(); setTimeout(resizeSignage, 50);
};
</script>
</body>
</html>
