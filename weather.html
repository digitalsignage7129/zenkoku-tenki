<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お天気サイネージ</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #e6f2ff; }
        .grid { display: flex; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 20px; border: 2px solid #b3d1ff; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="panel" id="current">現在の天気: 読み込み中...</div>
        <div class="panel" id="forecast">3時間おき予報: 読み込み中...</div>
    </div>

    <script>
        // パラメータを無視して、緯度経度を直接ハードコード
        const lat = 34.8153; // 枚方市の緯度
        const lon = 135.6567; // 枚方市の経度
        
        // 必要な情報だけを厳選した最小限のURL（これで400エラーを防ぎます）
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,relative_humidity_2m&hourly=temperature_2m,weather_code&forecast_days=1&timezone=Asia%2FTokyo`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                document.getElementById('current').innerHTML = `
                    <h3>現在の天気</h3>
                    <p>気温: ${data.current.temperature_2m}℃</p>
                    <p>湿度: ${data.current.relative_humidity_2m}%</p>
                `;
                
                let forecastHtml = "<h3>3時間おき予報</h3>";
                for(let i=0; i<8; i++) {
                    forecastHtml += `<div>${i*3}時間後: ${data.hourly.temperature_2m[i*3]}℃</div>`;
                }
                document.getElementById('forecast').innerHTML = forecastHtml;
            })
            .catch(err => {
                document.getElementById('current').innerText = "通信エラー: " + err;
            });
    </script>
</body>
</html>
