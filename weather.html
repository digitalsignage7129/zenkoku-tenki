<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お天気サイネージ (最新安定版)</title>
    <style>
        /* ※以前のCSS設定をそのままここへコピーして使ってください */
        body { font-family: sans-serif; background: #e6f2ff; }
    </style>
</head>
<body>
    <div id="content">データを読み込んでいます...</div>

    <script>
        // 緯度経度は「豊橋」に固定しています。必要に応じて書き換えてください。
        const lat = 34.7667; 
        const lon = 137.3833;
        
        // 【重要】エラーの原因だった models=jma を削除しました
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=3`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                // ここで以前のデザインパーツにデータを流し込みます
                document.getElementById('content').innerHTML = `
                    <h1>現在の気温: ${data.current.temperature_2m}℃</h1>
                    <p>明日の最高気温: ${data.daily.temperature_2m_max[1]}℃</p>
                    <p>明後日の最高気温: ${data.daily.temperature_2m_max[2]}℃</p>
                `;
            })
            .catch(err => {
                document.getElementById('content').innerText = "通信エラーが発生しました";
            });
    </script>
</body>
</html>
