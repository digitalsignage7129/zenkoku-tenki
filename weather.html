<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お天気サイネージ</title>
    <style>
        body { margin: 0; background: #002244; color: white; font-family: sans-serif; text-align: center; }
        .main-card { width: 80%; margin: 20px auto; padding: 30px; background: #003366; border-radius: 20px; }
        .forecast-container { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .fc-box { background: #004488; padding: 15px; border-radius: 15px; width: 100px; }
    </style>
</head>
<body>
    <div class="main-card">
        <h1 id="title">天気を読み込み中...</h1>
        <div id="current-info" style="font-size: 30px;">しばらくお待ちください</div>
    </div>
    <div class="forecast-container" id="forecast-area"></div>

    <script>
        // URLパラメータ ?mytown=豊橋市 などで都市を切り替え可能
        const urlParams = new URLSearchParams(window.location.search);
        const myTown = urlParams.get('mytown') || '豊橋市';
        
        // 都市ごとの座標リスト（ここに追加していけば全国どこでも対応可能）
        const locations = {
            "豊橋市": {lat: 34.7667, lon: 137.3833},
            "枚方市": {lat: 34.8153, lon: 135.6567},
            "名古屋市": {lat: 35.1814, lon: 136.9064},
            "大阪市": {lat: 34.6937, lon: 135.5023}
        };

        const loc = locations[myTown] || {lat: 34.7667, lon: 137.3833};
        document.getElementById('title').innerText = myTown + "の天気";

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code,relative_humidity_2m&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo&forecast_days=3`;

        function getIcon(code) {
            if(code < 2) return "☀️";
            if(code < 50) return "☁️";
            return "☔";
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {
                document.getElementById('current-info').innerHTML = 
                    `${getIcon(data.current.weather_code)} 気温: ${data.current.temperature_2m}℃ / 湿度: ${data.current.relative_humidity_2m}%`;

                let html = "";
                for(let i=1; i<=5; i++) {
                    let idx = i * 3;
                    html += `
                        <div class="fc-box">
                            <div>${idx}h後</div>
                            <div style="font-size:40px;">${getIcon(data.hourly.weather_code[idx])}</div>
                            <div>${data.hourly.temperature_2m[idx]}℃</div>
                        </div>`;
                }
                document.getElementById('forecast-area').innerHTML = html;
            });
    </script>
</body>
</html>
