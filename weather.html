<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>全自動お天気サイネージ</title>
    </head>
<body>
    <div class="wrapper">
        <div class="header" id="location-name">読み込み中...</div>
        <div class="main-row"><div class="current" id="current">場所を確認中...</div></div>
        <div class="hourly-row" id="hourly-forecast"></div>
        <div class="daily-row" id="daily-forecast"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const townName = params.get('mytown') || '枚方';

        // 1. まず「地名」から「緯度経度」を検索する（Geocoding APIを使用）
        fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${townName}&count=1&language=ja`)
            .then(res => res.json())
            .then(data => {
                if (!data.results) throw new Error("場所が見つかりません");
                const loc = data.results[0];
                document.getElementById('location-name').innerText = loc.name + "の天気予報";
                return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=3`);
            })
            .then(res => res.json())
            .then(data => {
                // 2. あとは同じ（天気表示処理）
                const icon = (c) => c < 2 ? "☀️" : (c < 50 ? "☁️" : "☔");
                document.getElementById('current').innerHTML = `<div>現在</div><div style="font-size:150px;">${icon(data.current.weather_code)}</div><div style="font-size:100px;">${data.current.temperature_2m}℃</div>`;
                
                const nowHour = new Date().getHours();
                let h = "";
                for(let i=1; i<=6; i++) {
                    const targetHour = nowHour + (i * 3);
                    h += `<div class="fc-card">${i*3}h後<br>${icon(data.hourly.weather_code[targetHour])}<br>${data.hourly.temperature_2m[targetHour]}℃</div>`;
                }
                document.getElementById('hourly-forecast').innerHTML = h;

                let d = "";
                for(let i=1; i<=2; i++) {
                    d += `<div class="daily-box"><div>${i===1?"明日":"明後日"}</div><div style="font-size:80px;">${icon(data.daily.weather_code[i])}</div><div>${data.daily.temperature_2m_max[i]}℃ / ${data.daily.temperature_2m_min[i]}℃</div></div>`;
                }
                document.getElementById('daily-forecast').innerHTML = d;
            })
            .catch(err => {
                document.getElementById('location-name').innerText = "エラー: 指定された場所が見つかりません";
            });
    </script>
</body>
</html>
