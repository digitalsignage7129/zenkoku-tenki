<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
        body { margin: 0; background: #0077be; color: #fff; font-family: sans-serif; }
        .wrapper { width: 1920px; height: 1080px; padding: 50px; display: flex; flex-direction: column; }
        
        /* 現在の天気を超巨大化 */
        .header { font-size: 60px; margin-bottom: 20px; }
        .hero { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 40px; }
        .temp-big { font-size: 200px; font-weight: bold; }
        
        /* 予報はシンプルに4枠だけ */
        .forecast-row { display: flex; gap: 20px; margin-top: 40px; }
        .fc-card { flex: 1; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 30px; text-align: center; font-size: 40px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header" id="title">読み込み中...</div>
        <div class="hero" id="current">読み込み中...</div>
        <div class="forecast-row" id="forecast"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const town = params.get('name') || '指定地点';
        const lat = params.get('lat') || '34.8153';
        const lon = params.get('lon') || '135.6567';

        document.getElementById('title').innerText = town + "の天気予報";

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&timezone=Asia%2FTokyo&forecast_days=1`)
            .then(res => res.json())
            .then(data => {
                const icon = (c) => c < 2 ? "☀️" : (c < 50 ? "☁️" : "☔");
                document.getElementById('current').innerHTML = 
                    `<div style="font-size:150px;">${icon(data.current.weather_code)}</div>
                     <div class="temp-big">${data.current.temperature_2m}℃</div>`;
                
                let h = "";
                for(let i=0; i<4; i++) {
                    h += `<div class="fc-card">${(i+1)*3}h後<br>${icon(data.hourly.weather_code[(i+1)*3])}<br>${data.hourly.temperature_2m[(i+1)*3]}℃</div>`;
                }
                document.getElementById('forecast').innerHTML = h;
            });
    </script>
</body>
</html>
