<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>Weather API Saver</title></head>
<body>
<script>
function updateWeather() {
    const API_KEY = '6b80c00ad3da39082b7e25c449d07c51';
    // デフォルトは東京、URLに指定があればそれを使う
    const urlParams = new URLSearchParams(window.location.search);
    let cityName = decodeURIComponent(urlParams.get('mytown') || '東京').trim();
    let pureName = cityName.replace(/[市区町村]$/, "");

    fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(pureName)},JP&limit=1&appid=${API_KEY}`)
    .then(r => r.json())
    .then(geo => {
        if (!geo || geo.length === 0) return fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(cityName)},JP&limit=1&appid=${API_KEY}`).then(r => r.json());
        return geo;
    })
    .then(finalGeo => {
        if (!finalGeo || finalGeo.length === 0) return;
        const lat = finalGeo[0].lat; const lon = finalGeo[0].lon;
        return Promise.all([
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ja`).then(r => r.json()),
            fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ja`).then(r => r.json())
        ]);
    })
    .then(([current, forecast]) => {
        // 👑 取得したデータを、端末の共通ブラウザキャッシュ（localStorage）に「地名ごとの鍵」で保存
        localStorage.setItem(`weather_data_${cityName}`, JSON.stringify({ current, forecast, timestamp: Date.now() }));
        console.log(`Weather updated for ${cityName}`);
    }).catch(e => console.error(e));
}
// 30分に1回通信するだけ（1台あたり1日48回しか消費しません）
updateWeather(); setInterval(updateWeather, 1800000);
</script>
</body>
</html>
