<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国お天気サイネージ検索ポータル</title>
    <style>
        body {
            font-family: sans-serif; background-color: #e6f2ff; color: #1c2d42; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            max-width: 800px; width: 90%; background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,51,102,0.08); border: 3px solid #b3d1ff; box-sizing: border-box;
        }
        h1 { text-align: center; color: #003366; font-size: 32px; margin-top: 0; margin-bottom: 10px; font-weight: 900; }
        p.subtitle { text-align: center; color: #4a607a; margin-bottom: 35px; font-size: 18px; font-weight: bold; }
        
        .search-box-container {
            background: #f4f9ff; border: 2px solid #0066cc; padding: 30px; border-radius: 16px;
        }
        .search-title { font-size: 20px; font-weight: bold; color: #003366; margin-bottom: 15px; }
        .search-row { display: flex; gap: 15px; }
        .search-input {
            flex: 1; padding: 18px; font-size: 20px; border: 2px solid #b3d1ff; border-radius: 10px; font-weight: bold; color: #1c2d42;
        }
        .search-input:focus { border-color: #0066cc; outline: none; }
        .search-btn {
            background: #0066cc; color: white; border: none; padding: 0 35px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .search-btn:hover { background: #004499; }
        .search-help { font-size: 15px; color: #667788; margin-top: 15px; font-weight: bold; line-height: 1.5; }
        .status-msg { font-size: 16px; color: #0088cc; font-weight: bold; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌦️ 現場用お天気サイネージ</h1>
    <p class="subtitle">日本全国・全自動地域判定システム</p>

    <div class="search-box-container">
        <div class="search-title">📍 対象の都道府県名、または都市名を入力してください</div>
        <div class="search-row">
            <input type="text" id="keywordInput" class="search-input" placeholder="例：東京、大阪、愛知、福岡、北海道...">
            <button onclick="searchAreaAll()" class="search-btn">サイネージを起動</button>
        </div>
        <div id="statusMsg" class="status-msg">🔄 全国マスターデータを照合中...</div>
        <div class="search-help">
            💡 <strong>入力のヒント：</strong>「東京都」「大阪府」のように「都府県」をつけず、<strong>「東京」「大阪」「愛知」</strong>と入力するだけで、その地域のサイネージが確実に自動起動します。
        </div>
    </div>
</div>

<script>
let jmaAreaMaster = null;

// 起動時に日本全国の全地域辞書をバックグラウンドで読み込み
window.onload = function() {
    fetch('https://www.jma.go.jp/bosai/common/const/area.json')
        .then(res => res.json())
        .then(data => { jmaAreaMaster = data; })
        .catch(err => console.error("マスターデータの取得に失敗しました", err));
};

function searchAreaAll() {
    const input = document.getElementById('keywordInput').value.trim();
    if (!input) { alert('地域名を入力してください。'); return; }
    if (!jmaAreaMaster) { alert('システム準備中です。数秒後に再度お試しください。'); return; }

    document.getElementById('statusMsg').style.display = "block";

    let targetCode = null;
    let targetSubIdx = 0;
    let matchFound = false;

    // 1. まずは最も広い「centers（地方単位）」や「offices（都道府県単位）」から検索（東京、大阪、愛知などに一発対応）
    const offices = jmaAreaMaster.offices;
    for (let oCode in offices) {
        if (offices[oCode].name.includes(input)) {
            targetCode = oCode;
            targetSubIdx = 0; // 都道府県の代表地域をデフォルトに設定
            matchFound = true;
            break;
        }
    }

    // 2. 都道府県名でヒットしなかった場合、細かい市町村階層（class30s / class20s）をディープスキャン
    if (!matchFound) {
        const class30s = jmaAreaMaster.class30s;
        for (let c30Code in class30s) {
            if (class30s[c30Code].name.includes(input)) {
                const parentClass20 = class30s[c30Code].parent;
                const class20 = jmaAreaMaster.class20s[parentClass20];
                if (class20) {
                    const parentOffices = class20.parent; 
                    targetCode = parentOffices;
                    
                    const officeObj = jmaAreaMaster.offices[parentOffices];
                    if (officeObj && officeObj.children) {
                        const parentClass20s = officeObj.children;
                        for (let i = 0; i < parentClass20s.length; i++) {
                            if (parentClass20s[i] === parentClass20) {
                                targetSubIdx = i;
                                break;
                            }
                        }
                    }
                    matchFound = true;
                    break;
                }
            }
        }
    }

    document.getElementById('statusMsg').style.display = "none";

    if (matchFound && targetCode) {
        window.location.href = `weather.html?area=${targetCode}&sub=${targetSubIdx}`;
    } else {
        alert(`「${input}」に該当する地域が見つかりませんでした。別の主要な県名や地域名でお試しください。`);
    }
}

document.getElementById('keywordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { searchAreaAll(); }
});
</script>
</body>
</html>
