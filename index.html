<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国お天気サイネージ検索ポータル</title>
    <style>
        body {
            font-family: sans-serif; background-color: #e6f2ff; color: #1c2d42; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            max-width: 800px; width: 90%; background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,51,102,0.08); border: 3px solid #b3d1ff; box-sizing: border-box;
        }
        h1 { text-align: center; color: #003366; font-size: 32px; margin-top: 0; margin-bottom: 10px; font-weight: 900; }
        p.subtitle { text-align: center; color: #4a607a; margin-bottom: 35px; font-size: 18px; font-weight: bold; }
        
        .search-box-container {
            background: #f4f9ff; border: 2px solid #0066cc; padding: 30px; border-radius: 16px;
        }
        .search-title { font-size: 20px; font-weight: bold; color: #003366; margin-bottom: 15px; }
        .search-row { display: flex; gap: 15px; }
        .search-input {
            flex: 1; padding: 18px; font-size: 20px; border: 2px solid #b3d1ff; border-radius: 10px; font-weight: bold; color: #1c2d42;
        }
        .search-input:focus { border-color: #0066cc; outline: none; }
        .search-btn {
            background: #0066cc; color: white; border: none; padding: 0 35px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .search-btn:hover { background: #004499; }
        .search-help { font-size: 15px; color: #667788; margin-top: 15px; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌦️ 現場用お天気サイネージ</h1>
    <p class="subtitle">日本全国・全自動地域判定システム</p>

    <div class="search-box-container">
        <div class="search-title">📍 対象の市区町村名を入力してください</div>
        <div class="search-row">
            <input type="text" id="keywordInput" class="search-input" placeholder="例：枚方、西条、豊橋、東京、大阪...">
            <button onclick="searchLocation()" class="search-btn">サイネージを起動</button>
        </div>
        <div class="search-help">
            💡 入力した名前がそのままサイネージの画面左上にバシッと表示されます。
        </div>
    </div>
</div>

<script>
// 全国主要マッピング（気象データ連動用）
const globalLocationDatabase = {
    "枚方": { code: "270000", sub: 1, disp: "枚方市" },
    "交野": { code: "270000", sub: 1, disp: "交野市" },
    "寝屋川": { code: "270000", sub: 1, disp: "寝屋川市" },
    "守口": { code: "270000", sub: 1, disp: "守口市" },
    "門真": { code: "270000", sub: 1, disp: "門真市" },
    "東大阪": { code: "270000", sub: 1, disp: "東大阪市" },
    "八尾": { code: "270000", sub: 1, disp: "八尾市" },
    "豊中": { code: "270000", sub: 0, disp: "豊中市" },
    "高槻": { code: "270000", sub: 0, disp: "高槻市" },
    "吹田": { code: "270000", sub: 0, disp: "吹田市" },
    "茨木": { code: "270000", sub: 0, disp: "茨木市" },
    "堺": { code: "270000", sub: 2, disp: "堺市" },
    "岸和田": { code: "270000", sub: 2, disp: "岸和田市" },

    "西条": { code: "380000", sub: 1, disp: "西条市" },
    "新居浜": { code: "380000", sub: 1, disp: "新居浜市" },
    "今治": { code: "380000", sub: 1, disp: "今治市" },
    "松山": { code: "380000", sub: 0, disp: "松山市" },
    "宇和島": { code: "380000", sub: 2, disp: "宇和島市" },

    "豊橋": { code: "230000", sub: 1, disp: "豊橋市" },
    "岡崎": { code: "230000", sub: 1, disp: "岡崎市" },
    "名古屋": { code: "230000", sub: 0, disp: "名古屋市" },

    "東京": { code: "130000", sub: 0, disp: "東京都" },
    "新宿": { code: "130000", sub: 0, disp: "新宿区" },
    "大阪": { code: "270000", sub: 0, disp: "大阪府" }
};

function searchLocation() {
    let input = document.getElementById('keywordInput').value.trim();
    if (!input) { alert('地域名を入力してください。'); return; }

    const cleanInput = input.replace(/[市区町村都道府県]/g, "");

    let found = null;
    for (let key in globalLocationDatabase) {
        if (key.includes(cleanInput) || cleanInput.includes(key)) {
            found = globalLocationDatabase[key];
            break;
        }
    }

    if (found) {
        // 気象データ用コードと一緒に、「画面表示させたい名前（found.disp）」を確実に引き渡す
        window.location.href = `weather.html?area=${found.code}&sub=${found.sub}&mytown=${encodeURIComponent(found.disp)}`;
    } else {
        // リストにない突発的なキーワードでも、入力された文字をそのまま表示名にして起動する
        window.location.href = `weather.html?area=270000&sub=0&mytown=${encodeURIComponent(input)}`;
    }
}

document.getElementById('keywordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { searchLocation(); }
});
</script>
</body>
</html>
