<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天気予報 検索センター</title>
    <style>
        body { background: #0077be; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        input { font-size: 20px; padding: 10px; width: 300px; }
        button { font-size: 20px; padding: 10px 20px; cursor: pointer; }
        .list-item { background: rgba(255,255,255,0.2); margin: 10px; padding: 15px; width: 450px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 5px; }
        .btn-link { padding: 5px 10px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <h1>表示する地域を選択</h1>
    <div>
        <input type="text" id="query" placeholder="市町村名を入力">
        <button onclick="searchLocation()">検索</button>
    </div>
    <div id="results"></div>

    <script>
        function searchLocation() {
            const query = document.getElementById('query').value;
            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&language=ja`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('results');
                    container.innerHTML = "";
                    if (!data.results) { container.innerHTML = "見つかりませんでした"; return; }
                    data.results.forEach(loc => {
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        div.innerHTML = `
                            <span>${loc.name} (${loc.admin1 || ''})</span>
                            <div class="btn-group">
                                <button class="btn-link" onclick="window.open('weather.html?lat=${loc.latitude}&lon=${loc.longitude}&name=${encodeURIComponent(loc.name)}')">通常版</button>
                                <button class="btn-link" onclick="window.open('mini_weather.html?lat=${loc.latitude}&lon=${loc.longitude}&name=${encodeURIComponent(loc.name)}')">ミニ版</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                });
        }
    </script>
</body>
</html>
