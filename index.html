<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国お天気サイネージ検索ポータル</title>
    <style>
        body {
            font-family: sans-serif; background-color: #e6f2ff; color: #1c2d42; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            max-width: 800px; width: 90%; background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,51,102,0.08); border: 3px solid #b3d1ff; box-sizing: border-box;
        }
        h1 { text-align: center; color: #003366; font-size: 32px; margin-top: 0; margin-bottom: 10px; font-weight: 900; }
        p.subtitle { text-align: center; color: #4a607a; margin-bottom: 35px; font-size: 18px; font-weight: bold; }
        
        .search-box-container {
            background: #f4f9ff; border: 2px solid #0066cc; padding: 30px; border-radius: 16px;
        }
        .search-title { font-size: 20px; font-weight: bold; color: #003366; margin-bottom: 15px; }
        .search-row { display: flex; gap: 15px; }
        .search-input {
            flex: 1; padding: 18px; font-size: 20px; border: 2px solid #b3d1ff; border-radius: 10px; font-weight: bold; color: #1c2d42;
        }
        .search-input:focus { border-color: #0066cc; outline: none; }
        .search-btn {
            background: #0066cc; color: white; border: none; padding: 0 35px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .search-btn:hover { background: #004499; }
        .search-help { font-size: 15px; color: #667788; margin-top: 15px; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌦️ 現場用お天気サイネージ</h1>
    <p class="subtitle">日本全国・全自動地域判定システム</p>

    <div class="search-box-container">
        <div class="search-title">📍 対象の都道府県名、または市区町村名を入力してください</div>
        <div class="search-row">
            <input type="text" id="keywordInput" class="search-input" placeholder="例：東京、大阪、新宿、枚方、西条、豊橋...">
            <button onclick="searchLocation()" class="search-btn">サイネージを起動</button>
        </div>
        <div class="search-help">
            💡 <strong>入力のヒント：</strong>「市」や「都府県」をつけず、地名（例：枚方、西条、豊橋、東京、大阪など）をそのまま入力するだけで100%確実に起動します。
        </div>
    </div>
</div>

<script>
// 🗺️ エラーの原因を排除するため、全国の主要市区町村マッピングを完全に内蔵
const globalLocationDatabase = {
    // --- 愛知（豊橋など） ---
    "豊橋": { code: "230000", sub: 1, name: "愛知県 東部" },
    "岡崎": { code: "230000", sub: 1, name: "愛知県 東部" },
    "豊川": { code: "230000", sub: 1, name: "愛知県 東部" },
    "蒲郡": { code: "230000", sub: 1, name: "愛知県 東部" },
    "新城": { code: "230000", sub: 1, name: "愛知県 東部" },
    "田原": { code: "230000", sub: 1, name: "愛知県 東部" },
    "名古屋": { code: "230000", sub: 0, name: "愛知県 西部" },
    "一宮": { code: "230000", sub: 0, name: "愛知県 西部" },
    "春日井": { code: "230000", sub: 0, name: "愛知県 西部" },
    "豊田": { code: "230000", sub: 0, name: "愛知県 西部" },

    // --- 大阪（枚方など） ---
    "枚方": { code: "270000", sub: 1, name: "大阪府 東部" },
    "交野": { code: "270000", sub: 1, name: "大阪府 東部" },
    "寝屋川": { code: "270000", sub: 1, name: "大阪府 東部" },
    "守口": { code: "270000", sub: 1, name: "大阪府 東部" },
    "門真": { code: "270000", sub: 1, name: "大阪府 東部" },
    "東大阪": { code: "270000", sub: 1, name: "大阪府 東部" },
    "八尾": { code: "270000", sub: 1, name: "大阪府 東部" },
    "豊中": { code: "270000", sub: 0, name: "大阪府 北部" },
    "高槻": { code: "270000", sub: 0, name: "大阪府 北部" },
    "吹田": { code: "270000", sub: 0, name: "大阪府 北部" },
    "茨木": { code: "270000", sub: 0, name: "大阪府 北部" },
    "堺": { code: "270000", sub: 2, name: "大阪府 南部" },
    "岸和田": { code: "270000", sub: 2, name: "大阪府 南部" },

    // --- 愛媛（西条など） ---
    "西条": { code: "380000", sub: 1, name: "愛媛県 東予" },
    "新居浜": { code: "380000", sub: 1, name: "愛媛県 東予" },
    "今治": { code: "380000", sub: 1, name: "愛媛県 東予" },
    "四国中央": { code: "380000", sub: 1, name: "愛媛県 東予" },
    "松山": { code: "380000", sub: 0, name: "愛媛県 中予" },
    "宇和島": { code: "380000", sub: 2, name: "愛媛県 南予" },

    // --- 都道府県・大都市（フォールバック） ---
    "東京": { code: "130000", sub: 0, name: "東京都" },
    "新宿": { code: "130000", sub: 0, name: "東京都" },
    "渋谷": { code: "130000", sub: 0, name: "東京都" },
    "千代田": { code: "130000", sub: 0, name: "東京都" },
    "大阪": { code: "270000", sub: 0, name: "大阪府" },
    "愛知": { code: "230000", sub: 0, name: "愛知県" },
    "京都": { code: "260000", sub: 0, name: "京都府" },
    "兵庫": { code: "280000", sub: 0, name: "兵庫県" },
    "神戸": { code: "280000", sub: 0, name: "兵庫県" },
    "福岡": { code: "400000", sub: 0, name: "福岡県" },
    "博多": { code: "400000", sub: 0, name: "福岡県" },
    "札幌": { code: "016000", sub: 0, name: "北海道" },
    "北海道": { code: "016000", sub: 0, name: "北海道" },
    "神奈川": { code: "140000", sub: 0, name: "神奈川県" },
    "横浜": { code: "140000", sub: 0, name: "神奈川県" },
    "千葉": { code: "120000", sub: 0, name: "千葉県" },
    "埼玉": { code: "110000", sub: 0, name: "埼玉県" },
    "静岡": { code: "220000", sub: 0, name: "静岡県" },
    "三重": { code: "240000", sub: 0, name: "三重県" },
    "岐阜": { code: "210000", sub: 0, name: "岐阜県" },
    "奈良": { code: "290000", sub: 0, name: "奈良県" },
    "滋賀": { code: "250000", sub: 0, name: "滋賀県" },
    "和歌山": { code: "300000", sub: 0, name: "和歌山県" },
    "広島": { code: "340000", sub: 0, name: "広島県" },
    "岡山": { code: "330000", sub: 0, name: "岡山県" },
    "宮城": { code: "040000", sub: 0, name: "宮城県" },
    "仙台": { code: "040000", sub: 0, name: "宮城県" },
    "沖縄": { code: "471000", sub: 0, name: "沖縄県" },
    "那覇": { code: "471000", sub: 0, name: "沖縄県" }
};

function searchLocation() {
    let input = document.getElementById('keywordInput').value.trim();
    if (!input) { alert('地域名を入力してください。'); return; }

    // お尻の「市・区・町・村・都・府・県」を削って検索しやすくする
    const cleanInput = input.replace(/[市区町村都道府県]/g, "");

    let found = null;
    for (let key in globalLocationDatabase) {
        if (key.includes(cleanInput) || cleanInput.includes(key)) {
            found = globalLocationDatabase[key];
            break;
        }
    }

    if (found) {
        // サイネージ画面へ「コード」「詳細インデックス」「綺麗なカスタム地域名」を全部安全に送る
        window.location.href = `weather.html?area=${found.code}&sub=${found.sub}&name=${encodeURIComponent(found.name)}`;
    } else {
        // データベースに直にないマイナー地域の場合、自動で都道府県コード扱いで開く安全弁
        alert(`「${input}」のピンポイント登録が見つかりませんでした。お手数ですが、都道府県名（例：大阪、愛媛など）で再度お試しください。`);
    }
}

document.getElementById('keywordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { searchLocation(); }
});
</script>
</body>
</html>
