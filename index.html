<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天気予報検索</title>
    <style>
        body { background: #0077be; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        input { font-size: 30px; padding: 15px; width: 400px; }
        button { font-size: 30px; padding: 15px 30px; cursor: pointer; }
        .list-item { background: rgba(255,255,255,0.2); margin: 10px; padding: 20px; width: 400px; cursor: pointer; border-radius: 10px; }
        .list-item:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <h1>地域の天気を選択</h1>
    <div>
        <input type="text" id="query" placeholder="市町村名を入力">
        <button onclick="searchLocation()">検索</button>
    </div>
    <div id="results"></div>

    <script>
        function searchLocation() {
            const query = document.getElementById('query').value;
            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&language=ja`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('results');
                    container.innerHTML = "";
                    if (!data.results) { container.innerHTML = "見つかりませんでした"; return; }
                    data.results.forEach(loc => {
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        div.innerText = `${loc.name} (${loc.admin1 || ''})`;
                        div.onclick = () => window.location.href = `weather.html?lat=${loc.latitude}&lon=${loc.longitude}&name=${encodeURIComponent(loc.name)}`;
                        container.appendChild(div);
                    });
                });
        }
    </script>
</body>
</html>
