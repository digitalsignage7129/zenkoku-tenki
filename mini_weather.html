<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0077be; color: #fff; font-family: sans-serif; width: 525px; height: 610px; overflow: hidden; padding: 15px; box-sizing: border-box; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .forecast-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; height: 500px; }
        .day-column { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; text-align: center; }
        .time-label { font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        .icon { font-size: 50px; margin: 10px 0; }
        .temp-text { font-size: 18px; }
    </style>
</head>
<body>
    <div class="header" id="location-name">読み込み中...</div>
    
    <div class="forecast-grid">
        <div class="day-column">
            <div class="time-label" id="label-1">--</div>
            <div class="icon" id="icon-today-am">--</div>
            <div class="time-label" id="label-2">--</div>
            <div class="icon" id="icon-today-pm">--</div>
        </div>
        <div class="day-column">
            <div class="time-label">明日</div>
            <div class="icon" id="icon-1">--</div>
            <div class="temp-text" id="temp-1">--</div>
        </div>
        <div class="day-column">
            <div class="time-label">明後日</div>
            <div class="icon" id="icon-2">--</div>
            <div class="temp-text" id="temp-2">--</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const lat = params.get('lat') || 34.8153;
        const lon = params.get('lon') || 135.6567;
        document.getElementById('location-name').innerText = decodeURIComponent(params.get('name') || "場所");

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=weather_code&daily=weather_code,temperature_2m_max&timezone=Asia%2FTokyo&forecast_days=3`)
            .then(res => res.json())
            .then(data => {
                const icon = (c) => c < 2 ? "☀️" : (c < 50 ? "☁️" : "☔");
                const now = new Date();
                const currentHour = now.getHours();

                // ラベルの動的設定
                document.getElementById('label-1').innerText = currentHour < 12 ? "今日 午前" : "今日 午後";
                document.getElementById('label-2').innerText = currentHour < 12 ? "今日 午後" : "今夜";

                // データの動的選択
                document.getElementById('icon-today-am').innerText = icon(data.hourly.weather_code[currentHour < 12 ? 9 : 15]);
                document.getElementById('icon-today-pm').innerText = icon(data.hourly.weather_code[currentHour < 18 ? 18 : 21]);
                
                // 明日・明後日
                for(let i=1; i<=2; i++) {
                    document.getElementById(`icon-${i}`).innerText = icon(data.daily.weather_code[i]);
                    document.getElementById(`temp-${i}`).innerText = data.daily.temperature_2m_max[i] + "℃";
                }
            });
    </script>
</body>
</html>
