<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0077be; color: #fff; font-family: sans-serif; width: 525px; height: 610px; overflow: hidden; padding: 15px; box-sizing: border-box; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .current { text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .temp { font-size: 60px; font-weight: bold; }
        .wbgt { font-size: 20px; color: #ffeb3b; margin-top: 5px; }
        .daily-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header" id="location-name">読み込み中...</div>
    <div class="current">
        <div id="icon" style="font-size: 80px;">--</div>
        <div class="temp" id="temp">--℃</div>
        <div class="wbgt" id="wbgt">WBGT: --</div>
    </div>
    <div class="daily-box" id="forecast">データ取得中...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const lat = params.get('lat') || 34.8153;
        const lon = params.get('lon') || 135.6567;
        const name = decodeURIComponent(params.get('name') || "場所");

        document.getElementById('location-name').innerText = name;

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&daily=weather_code,temperature_2m_max&timezone=Asia%2FTokyo&forecast_days=2`)
            .then(res => res.json())
            .then(data => {
                const icon = (c) => c < 2 ? "☀️" : (c < 50 ? "☁️" : "☔");
                const t = data.current.temperature_2m;
                const h = data.current.relative_humidity_2m;
                
                // WBGT近似計算
                const wbgt = (0.735 * t + 0.0374 * h + 0.00292 * t * h - 4.064).toFixed(1);
                
                document.getElementById('icon').innerText = icon(data.current.weather_code);
                document.getElementById('temp').innerText = t + "℃";
                document.getElementById('wbgt').innerText = "暑さ指数(WBGT): " + wbgt;
                document.getElementById('forecast').innerHTML = `<div>明日</div><div>${icon(data.daily.weather_code[1])}</div><div>${data.daily.temperature_2m_max[1]}℃</div>`;
            });
    </script>
</body>
</html>
